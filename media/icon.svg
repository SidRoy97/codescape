<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- shield -->
  <path d="M12 2L22 7v6q0 7-10 11Q2 20 2 13V7Z"
        fill="#3b1d8a" stroke="#7c3aed" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- inner ripple rings -->
  <circle cx="12" cy="13" r="6.5" stroke="#a78bfa" stroke-width="0.8" opacity="0.4"/>
  <circle cx="12" cy="13" r="4"   stroke="#a78bfa" stroke-width="0.9" opacity="0.6"/>
  <!-- connection lines to satellites -->
  <line x1="12" y1="13" x2="16.5" y2="8.5"  stroke="#c4b5fd" stroke-width="0.9" opacity="0.9"/>
  <line x1="12" y1="13" x2="7"    y2="9.5"   stroke="#c4b5fd" stroke-width="0.9" opacity="0.9"/>
  <line x1="12" y1="13" x2="15"   y2="18.5"  stroke="#c4b5fd" stroke-width="0.9" opacity="0.9"/>
  <!-- satellite nodes -->
  <circle cx="16.5" cy="8.5"  r="1.8" fill="#c4b5fd"/>
  <circle cx="7"    cy="9.5"  r="1.8" fill="#c4b5fd"/>
  <circle cx="15"   cy="18.5" r="1.8" fill="#c4b5fd"/>
  <!-- center node -->
  <circle cx="12" cy="13" r="3.5" fill="#7c3aed"/>
  <circle cx="12" cy="13" r="1.8" fill="#ede9fe"/>
</svg>